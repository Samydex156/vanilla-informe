<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Estudiantes - SGRA</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <nav>
      <h1>SGRA | Estudiantes</h1>
      <ul>
        <li><a href="index.html">Cursos</a></li>
        <li><a href="estudiantes.html">Estudiantes</a></li>
        <li><a href="informes.html">Reportes</a></li>
      </ul>
    </nav>

    <main>
      <section class="card">
        <h3>Registrar Nuevo Estudiante</h3>
        <form
          id="form-estudiante"
          style="display: grid; gap: 1rem; margin-top: 1rem"
        >
          <div>
            <label>Nombre Completo:</label>
            <input
              type="text"
              id="nombre"
              required
              style="width: 100%; padding: 8px"
            />
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
            <div>
              <label>Curso:</label>
              <select
                id="select-curso"
                required
                style="width: 100%; padding: 8px"
              >
                <option value="">Seleccione curso...</option>
              </select>
            </div>
            <div>
              <label>Módulo de Inicio:</label>
              <select
                id="select-modulo"
                required
                style="width: 100%; padding: 8px"
              >
                <option value="">Primero elija un curso...</option>
              </select>
            </div>
          </div>
          <div>
            <label>Fecha de Ingreso (Primera Clase):</label>
            <input
              type="date"
              id="fecha-ingreso"
              required
              style="width: 100%; padding: 8px"
            />
          </div>
          <button type="submit" class="btn btn-primary">
            Registrar e Inscribir
          </button>
        </form>
      </section>

      <div style="margin-top: 2rem; margin-bottom: 1rem;">
        <input type="text" id="buscador-general-estudiantes" placeholder="🔍 Buscar estudiante registrado por nombre..." class="form-control" style="width: 100%; padding: 10px; font-size: 1rem; border-radius: 6px; border: 1px solid var(--border);" autofocus>
      </div>

      <section class="table-container">
        <table id="tabla-estudiantes">
          <thead>
            <tr>
              <th>Estudiante</th>
              <th>Curso</th>
              <th>Módulo Inicio</th>
              <th>Fecha Ingreso</th>
              <th>Asistencias</th>
              <th>Faltas</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <!-- Datos cargados dinámicamente -->
          </tbody>
        </table>
      </section>

      <!-- Modal de Edición -->
      <div
        id="modal-edit"
        style="
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.5);
          z-index: 1000;
          align-items: center;
          justify-content: center;
        "
      >
        <div class="card" style="width: 400px">
          <h3>Editar Estudiante</h3>
          <form
            id="form-edit"
            style="display: grid; gap: 1rem; margin-top: 1rem"
          >
            <input type="hidden" id="edit-estudiante-id" />
            <input type="hidden" id="edit-inscripcion-id" />
            <div>
              <label>Nombre:</label>
              <input
                type="text"
                id="edit-nombre"
                required
                style="width: 100%; padding: 8px"
              />
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
              <div>
                <label>Curso:</label>
                <select
                  id="edit-curso"
                  required
                  style="width: 100%; padding: 8px"
                >
                  <option value="">Cargando cursos...</option>
                </select>
              </div>
              <div>
                <label>Módulo de Inicio:</label>
                <select
                  id="edit-modulo"
                  required
                  style="width: 100%; padding: 8px"
                >
                  <option value="">Cargando módulos...</option>
                </select>
              </div>
            </div>
            <div>
              <label>Fecha Ingreso:</label>
              <input
                type="date"
                id="edit-fecha"
                required
                style="width: 100%; padding: 8px"
              />
            </div>
            <div style="display: flex; gap: 0.5rem; margin-top: 1rem">
              <button type="submit" class="btn btn-primary">
                Guardar Cambios
              </button>
              <button
                type="button"
                class="btn"
                onclick="cerrarModal()"
                style="background: #ccc"
              >
                Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main-estudiantes.js"></script>
    <!-- Lógica específica -->
  </body>
</html>
